version: '3.9'
services:
  db:
    image: postgres:15
    container_name: sql_book_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DBi: university_system
    ports:
      - "5432:5432"
    volumes:
      - ./schema:/docker-entrypoint-intdb.d
